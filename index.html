<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />

    <!-- Responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Simulador de Financiamento Veicular</title>
    <meta name="description" content="Simule financiamento veicular com juros, parcelas, IPVA e seguro." />
    <meta name="keywords" content="financiamento veicular, simulador, juros de carro" />
    <meta name="author" content="Seu Nome" />

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<main class="container">
    <h1>🚗 Simulador de Financiamento</h1>

    <form id="form">
        <input type="number" id="valor" placeholder="Valor do veículo" required>
        <input type="number" id="entrada" placeholder="Entrada" required>
        <input type="number" id="taxa" placeholder="Taxa de juros (% ao mês)" required>
        <input type="number" id="prazo" placeholder="Prazo (meses)" required>
        <input type="number" id="seguro" placeholder="Seguro anual">
        <input type="number" id="ipva" placeholder="IPVA anual">
        <button type="submit">Calcular</button>
    </form>

    <section id="resultado" class="resultado" hidden></section>
</main>

<!-- JavaScript -->
<script src="js/script.js" defer></script>

</body>
</html>
